version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"

sphinx:
  configuration: docs/conf.py
  # Keep warnings visible in RTD logs, but do not fail the build for now
  fail_on_warning: false

python:
  install:
    # Install only doc/runtime deps to avoid compiling the Rust extension on RTD
    - requirements: docs/requirements.txt

formats:
  - htmlzip

