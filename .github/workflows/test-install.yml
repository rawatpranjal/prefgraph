name: Test Install

on: workflow_dispatch

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install from PyPI
        run: pip install "pyrevealed[datasets]==0.5.3"
      - name: Verify
        run: |
          python -c "
          import pyrevealed
          print(f'Version: {pyrevealed.__version__}')
          from pyrevealed._rust_backend import HAS_RUST
          print(f'Rust backend: {HAS_RUST}')
          from pyrevealed import Engine
          e = Engine(['ccei'])
          print('Engine created OK')
          # Quick smoke test with demo data
          from pyrevealed import load_demo
          data = load_demo(n_users=5)
          results = e.analyze_arrays(data)
          print(f'Analyzed {len(data)} users')
          print(f'Result type: {type(results)}')
          print(f'First result: {results[0] if isinstance(results, list) else results}')
          print('ALL TESTS PASSED')
          "
